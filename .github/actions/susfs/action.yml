name: 'SUSFS Setup'
description: 'Clones and prepares SUSFS patches for KernelSU'

inputs:
  susfs_commit:
    description: 'Specific SUSFS commit hash'
    required: false
    default: ''
  version:
    description: 'Build version string (e.g., android16-6.12)'
    required: true
  android_version:
    description: 'Android version'
    required: false
  kernel_version:
    description: 'Kernel major version'
    required: false
  os_patch_level:
    description: 'OS patch level'
    required: false
  sublevel:
    description: 'Kernel sublevel'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Clone and Checkout SUSFS
      shell: bash
      run: |
        set -euo pipefail

        TARGET_BRANCH="gki-${{ inputs.version }}"
        SUSFS_DIR="${{ github.workspace }}/susfs4ksu"

        echo "Preparing SUSFS for branch: ${TARGET_BRANCH}"

        # Clean old directory if present
        rm -rf "$SUSFS_DIR"

        # Clone full repository history (avoid --depth 1 so commit hashes are accessible)
        git clone https://gitlab.com/pershoot/susfs4ksu.git "$SUSFS_DIR"

        cd "$SUSFS_DIR"

        # 1. If a specific commit hash was provided, fetch and checkout that commit
        if [ -n "${{ inputs.susfs_commit }}" ]; then
          echo "Fetching and checking out specific commit: ${{ inputs.susfs_commit }}"
          git fetch origin ${{ inputs.susfs_commit }} || true
          git checkout ${{ inputs.susfs_commit }}

        # 2. Otherwise try checking out the matching version branch
        elif git rev-parse --verify "origin/${TARGET_BRANCH}" >/dev/null 2>&1; then
          echo "Checking out matching branch: ${TARGET_BRANCH}"
          git checkout "${TARGET_BRANCH}"

        # 3. Fallback if the requested version branch doesn't exist on GitLab yet
        else
          echo "⚠️ Branch '${TARGET_BRANCH}' not found in remote repository."
          echo "Falling back to master branch..."
          git checkout master || git checkout main
        fi

        echo "✅ SUSFS repo ready at commit: $(git rev-parse HEAD)"