name: 'BORE Scheduler Setup'
description: 'Downloads and applies the BORE CPU scheduler patch'

inputs:
  kernel_version:
    description: 'Kernel major version (e.g. 6.12)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Apply BORE Patch
      shell: bash
      run: |
        set -euo pipefail

        KVER="${{ inputs.kernel_version }}"
        echo "======================================================="
        echo "🚀 Applying BORE Scheduler for Kernel ${KVER}"
        echo "======================================================="

        # Locate kernel source root (Android GKI places kernel source in kernel/common or common)
        if [ -d "${{ github.workspace }}/kernel/common" ]; then
          KERNEL_DIR="${{ github.workspace }}/kernel/common"
        elif [ -d "${{ github.workspace }}/common" ]; then
          KERNEL_DIR="${{ github.workspace }}/common"
        else
          KERNEL_DIR="${{ github.workspace }}"
        fi

        echo "Kernel directory set to: ${KERNEL_DIR}"

        PATCH_FILE="${{ github.workspace }}/bore-${KVER}.patch"
        SUCCESS=0

        # Remote patch sources
        URLS=(
          "https://raw.githubusercontent.com/CachyOS/kernel-patches/master/${KVER}/sched/0001-bore-cachy.patch"
          "https://raw.githubusercontent.com/firelzrd/bore-scheduler/main/patches/stable/linux-${KVER}-bore/0001-linux${KVER}.y-bore.patch"
          "https://raw.githubusercontent.com/firelzrd/bore-scheduler/main/patches/testing/linux-${KVER}-bore/0001-linux${KVER}.y-bore.patch"
        )

        for url in "${URLS[@]}"; do
          echo "Attempting download from: $url"
          if curl -sSL -f "$url" -o "$PATCH_FILE"; then
            echo "✅ Successfully downloaded BORE patch from $url"
            SUCCESS=1
            break
          fi
        done

        if [ $SUCCESS -ne 1 ]; then
          if [ -f "${{ github.workspace }}/.github/patches/bore-${KVER}.patch" ]; then
            echo "✅ Using local fallback patch"
            cp "${{ github.workspace }}/.github/patches/bore-${KVER}.patch" "$PATCH_FILE"
            SUCCESS=1
          else
            echo "❌ Error: Could not obtain BORE patch for kernel ${KVER}."
            exit 1
          fi
        fi

        # Change directory to the kernel source before applying
        cd "$KERNEL_DIR"

        echo "Applying BORE patch in ${KERNEL_DIR}..."
        if patch -p1 --forward --batch --ignore-whitespace < "$PATCH_FILE"; then
          echo "✅ BORE Scheduler patch applied successfully!"
          # Inject config flag into build fragment if present
          if [ -f "${{ github.workspace }}/wild_gki.fragment" ]; then
            echo "CONFIG_SCHED_BORE=y" >> "${{ github.workspace }}/wild_gki.fragment"
          fi
        else
          echo "❌ Failed to apply BORE patch."
          exit 1
        fi