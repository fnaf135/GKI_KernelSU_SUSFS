name: 'Apply BORE Scheduler'
description: 'Apply the official BORE scheduler patch to Android 16 / Linux 6.12 GKI'

inputs:
  android_version:
    description: 'Android version (android16 is supported)'
    required: true
  kernel_version:
    description: 'Kernel version (6.12 is supported)'
    required: true
  sublevel:
    description: 'Kernel sublevel, used for diagnostics'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Apply official BORE patch
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      env:
        BORE_ANDROID_VERSION: ${{ inputs.android_version }}
        BORE_KERNEL_VERSION: ${{ inputs.kernel_version }}
        BORE_KERNEL_SUBLEVEL: ${{ inputs.sublevel }}
      run: bash "${GITHUB_ACTION_PATH}/apply_bore.sh"

    - name: Enable BORE kernel configuration
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_SCHED_BORE=y
          CONFIG_MIN_BASE_SLICE_NS=2000000
